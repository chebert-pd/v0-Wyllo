name: Update Codebase Index

# Runs automatically when you push to main and any component or metadata file changes.
# All component files (.tsx) and metadata files (.metadata.json) live together in:
# my-app/components/ui/
# Can also be triggered manually from the GitHub Actions tab.
on:
  push:
    branches: [main]
    paths:
      - "my-app/components/ui/**"
  workflow_dispatch: # enables the "Run workflow" button on GitHub

jobs:
  update-index:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run codebase indexer
        run: python my-app/scripts/index_codebase.py my-app

      - name: Create PR if index changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add my-app/components/.ai/

          # Check if there are any staged changes
          if ! git diff --staged --quiet; then
            # Create a new branch for this update
            BRANCH="chore/update-index-$(date +%s)"
            git checkout -b "$BRANCH"
            git commit -m "chore: update codebase index"
            git push origin "$BRANCH"

            # Create a PR
            gh pr create \
              --title "chore: update codebase index" \
              --body "Automated codebase index update from workflow" \
              --base main \
              --head "$BRANCH"
          fi
